name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: FFmpegTools-macos-arm64
            ext: zip
          - os: macos-13
            artifact: FFmpegTools-macos-x86_64
            ext: zip
          - os: windows-latest
            artifact: FFmpegTools-windows-x86_64
            ext: zip
          - os: ubuntu-latest
            artifact: FFmpegTools-linux-x86_64
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version from tag
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -e ".[gui]" pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller ffmpeg_gui.spec --noconfirm

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.artifact }}.zip FFmpegTools.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/FFmpegTools.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C dist FFmpegTools

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            FFmpegTools-macos-arm64.zip
            FFmpegTools-macos-x86_64.zip
            FFmpegTools-windows-x86_64.zip
            FFmpegTools-linux-x86_64.tar.gz
